<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>蒸汽摆荡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            overflow: hidden;
            background: #0d0a05;
            font-family: 'Courier New', monospace;
            touch-action: none;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .hud {
            position: absolute;
            color: #c9a96e;
            text-shadow: 0 0 8px #c9a96e;
            font-size: 14px;
            font-weight: bold;
        }
        #score { top: 12px; left: 16px; }
        #combo { top: 12px; right: 16px; }
        #best { top: 36px; left: 16px; font-size: 12px; color: #8b6914; }
        #status {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #c9a96e;
            text-shadow: 0 0 12px #c9a96e;
            pointer-events: auto;
        }
        #status h1 {
            font-size: 36px;
            margin-bottom: 16px;
            letter-spacing: 6px;
        }
        #status p {
            font-size: 14px;
            color: #a08050;
            margin-bottom: 28px;
            line-height: 2;
        }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            border: 2px solid #c9a96e;
            color: #c9a96e;
            background: rgba(13, 10, 5, 0.95);
            font-size: 16px;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 0 16px rgba(201, 169, 110, 0.2);
        }
        .btn:active {
            background: #c9a96e;
            color: #0d0a05;
            box-shadow: 0 0 32px #c9a96e;
        }
        #hint {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #6a5a3a;
            font-size: 12px;
            line-height: 2;
            opacity: 0;
            transition: opacity 1s;
        }
        #hint.show { opacity: 1; }
    </style>
<base target="_blank">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="score" class="hud">0m</div>
        <div id="combo" class="hud">连击 0</div>
        <div id="best" class="hud">最佳 0m</div>
        <div id="status">
            <h1>⚙ 蒸汽摆荡 ⚙</h1>
            <p>👆 按住 → 钩爪抓锚，惯性向前摆荡<br>✋ 松开 → 释放飞出<br>⚠️ 撞顶即死亡，落地弹起</p>
            <button class="btn" id="startBtn">开始</button>
        </div>
        <div id="hint">
            <div>按住抓锚 → 惯性前荡 → 松手飞出</div>
        </div>
    </div>

<script>
// ==================== 初始化 ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, DPR;
function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ==================== 常量 ====================
const GRAVITY = 1200;
const MAX_GRAPPLE_LEN = 340;
const MIN_GRAPPLE_LEN = 50;
const ANCHOR_RANGE = 400;
const RELEASE_BOOST = 1.08;
const AIR_DRAG = 0.9995;
const CEILING_Y = 25;
const FLOOR_Y = H - 25;
const BOUNCE_DAMPING = 0.6;
const GROUND_BOOST_VX = 500;  // 地面点击向前冲量
const GROUND_BOOST_VY = -700; // 地面点击向上冲量

const COLORS = {
    bg: '#0d0a05',
    bgGrid: 'rgba(201, 169, 110, 0.025)',
    brass: '#c9a96e',
    brassDark: '#8b6914',
    brassLight: '#e8d5a3',
    copper: '#b87333',
    rust: '#8b4513',
    danger: '#c44',
    chain: '#6a5a3a',
    ground: '#151008',
    steam: 'rgba(200, 200, 180, 0.12)',
    dangerLine: 'rgba(200, 60, 60, 0.4)'
};

// ==================== 状态 ====================
const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
let state = STATE.MENU;
let frame = 0;
let score = 0;
let bestScore = 0;
try { bestScore = parseInt(localStorage.getItem('swing_best') || '0'); } catch(e) { bestScore = 0; }
let combo = 0;
let maxCombo = 0;
let cameraX = 0;

// ==================== 输入 ====================
let isPressed = false;
let onGround = false;  // 是否在地上

// ==================== 粒子 ====================
class Particle {
    constructor(x, y, vx, vy, life, color, size) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life;
        this.color = color;
        this.size = size;
    }
    update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy += 200 * dt;
        this.life -= dt;
        this.size *= 0.97;
    }
    draw(ctx) {
        const a = Math.max(0, this.life / this.maxLife);
        ctx.globalAlpha = a;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}
let particles = [];

function spawnSparks(x, y, count, color, speed) {
    for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const v = Math.random() * speed;
        particles.push(new Particle(x, y, Math.cos(a)*v, Math.sin(a)*v, 0.4+Math.random()*0.4, color, 2+Math.random()*3));
    }
}
function spawnSteam(x, y, vx, vy) {
    particles.push(new Particle(x, y, vx||0, vy||-40, 1+Math.random(), COLORS.steam, 6+Math.random()*10));
}

// ==================== 锚点 ====================
class Anchor {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.baseY = y;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = 0.3 + Math.random() * 0.5;
        this.amp = 6 + Math.random() * 12;
        this.pulse = 0;
    }
    update(dt) {
        this.phase += this.speed * dt;
        this.y = this.baseY + Math.sin(this.phase) * this.amp;
        this.pulse += dt * 4;
    }
    draw(ctx) {
        const pulse = Math.sin(this.pulse) * 3;
        ctx.strokeStyle = COLORS.brass;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 14 + pulse, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = COLORS.copper;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = COLORS.brassLight;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = COLORS.rust;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.x-2, this.y); ctx.lineTo(this.x+2, this.y);
        ctx.moveTo(this.x, this.y-2); ctx.lineTo(this.x, this.y+2);
        ctx.stroke();
    }
}
let anchors = [];

// ==================== 障碍 ====================
class Obstacle {
    constructor(x, y, w, h, type) {
        this.x = x; this.y = y; this.w = w; this.h = h;
        this.type = type;
        this.angle = Math.random() * Math.PI * 2;
        this.rotSpeed = (type==='saw') ? (3 + Math.random()*4) : 0;
    }
    update(dt) {
        this.angle += this.rotSpeed * dt;
    }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x + this.w/2, this.y + this.h/2);
        ctx.rotate(this.angle);
        if (this.type === 'spike') {
            ctx.fillStyle = '#555';
            ctx.strokeStyle = '#777';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(-this.w/2, this.h/2);
            ctx.lineTo(this.w/2, this.h/2);
            ctx.lineTo(0, -this.h/2);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
        } else if (this.type === 'saw') {
            const teeth = 10;
            ctx.fillStyle = '#633';
            ctx.strokeStyle = COLORS.danger;
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < teeth*2; i++) {
                const a = (i/(teeth*2)) * Math.PI*2;
                const r = i%2===0 ? this.w/2 : this.w*0.35;
                const px = Math.cos(a)*r, py = Math.sin(a)*r;
                if (i===0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(0,0, this.w*0.15, 0, Math.PI*2);
            ctx.fill();
        } else if (this.type === 'steam') {
            ctx.fillStyle = 'rgba(180,180,160,0.12)';
            ctx.beginPath();
            ctx.arc(0,0, this.w/2, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.restore();
    }
}
let obstacles = [];

// ==================== 收集物 ====================
class Coin {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.collected = false;
        this.float = Math.random() * Math.PI * 2;
    }
    update(dt) {
        this.float += dt * 2.5;
        this.y += Math.sin(this.float) * 0.6;
    }
    draw(ctx) {
        if (this.collected) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.float * 0.5);
        ctx.fillStyle = COLORS.brass;
        ctx.beginPath();
        const r = 10, teeth = 6;
        for (let i = 0; i < teeth*2; i++) {
            const a = (i/(teeth*2)) * Math.PI*2;
            const rad = i%2===0 ? r : r*0.65;
            const px = Math.cos(a)*rad, py = Math.sin(a)*rad;
            if (i===0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = COLORS.brassLight;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = COLORS.brassLight;
        ctx.beginPath();
        ctx.arc(0,0, 3.5, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}
let coins = [];

// ==================== 玩家 ====================
const player = {
    x: 100, y: H/2,
    vx: 0, vy: 0,
    r: 11,
    grappled: false,
    anchor: null,
    grappleLen: 0,
    trail: [],
    facing: 1,

    reset() {
        this.x = 80;
        this.y = H/2;
        this.vx = 300;
        this.vy = -100;
        this.grappled = false;
        this.anchor = null;
        this.trail = [];
        this.facing = 1;
        onGround = false;
    },

    update(dt) {
        if (this.grappled && this.anchor) {
            // ========== 摆荡物理：基于速度积分，自然向前 ==========
            const ax = this.anchor.x;
            const ay = this.anchor.y;

            // 1. 应用重力
            this.vy += GRAVITY * dt;

            // 2. 空气阻力
            this.vx *= 0.9998;
            this.vy *= 0.9998;

            // 3. 无约束运动一步
            let newX = this.x + this.vx * dt;
            let newY = this.y + this.vy * dt;

            // 4. 约束到绳长
            let dx = newX - ax;
            let dy = newY - ay;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist > 0) {
                const scale = this.grappleLen / dist;
                dx *= scale;
                dy *= scale;
                newX = ax + dx;
                newY = ay + dy;
            }

            // 5. 计算新速度（切向分量）
            const angle = Math.atan2(dy, dx);
            const tx = -Math.sin(angle);
            const ty = Math.cos(angle);
            const vTangent = this.vx * tx + this.vy * ty;

            this.vx = vTangent * tx;
            this.vy = vTangent * ty;

            this.x = newX;
            this.y = newY;

            this.facing = this.vx >= 0 ? 1 : -1;

            if (frame % 8 === 0) {
                spawnSteam(this.x, this.y + 5, -this.vx*0.05, -10);
            }

        } else {
            // ========== 自由飞行 ==========
            this.vy += GRAVITY * dt;
            this.vx *= AIR_DRAG;
            this.vy *= AIR_DRAG;
            this.x += this.vx * dt;
            this.y += this.vy * dt;

            if (Math.abs(this.vx) > 10) this.facing = this.vx > 0 ? 1 : -1;

            // 按住时尝试抓锚
            if (isPressed && !this.grappled) {
                this.tryGrapple();
            }

            if (frame % 5 === 0 && (Math.abs(this.vx) > 150 || Math.abs(this.vy) > 150)) {
                spawnSteam(this.x - this.vx*0.02, this.y, 0, 0);
            }
        }

        // 拖尾
        this.trail.push({x: this.x, y: this.y, life: 0.25});
        for (let i = this.trail.length-1; i >= 0; i--) {
            this.trail[i].life -= dt;
            if (this.trail[i].life <= 0) this.trail.splice(i, 1);
        }

        // ========== 落地处理 ==========
        onGround = false;
        if (this.y > FLOOR_Y - this.r) {
            this.y = FLOOR_Y - this.r;
            onGround = true;

            // 链着的时候落地：断链+使劲向上弹
            if (this.grappled) {
                this.grappled = false;
                this.anchor = null;
                this.vy = -600;  // 使劲向上弹
                this.vx = Math.max(this.vx * 1.3, 400); // 向前加速，保证最低速度
                spawnSparks(this.x, this.y, 12, COLORS.brass, 100);
                for (let i = 0; i < 8; i++) spawnSteam(this.x, this.y, 0, -60);
            } else {
                // 自由飞行落地：普通弹起
                this.vy = -Math.abs(this.vy) * BOUNCE_DAMPING;
                this.vx *= 0.85;
                spawnSparks(this.x, this.y, 3, COLORS.brass, 30);
            }
        }

        // ========== 地面点击救援 ==========
        // 如果停在地上（速度很小），点击给大冲量
        if (onGround && isPressed && !this.grappled) {
            const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
            if (speed < 150) {
                this.vx = GROUND_BOOST_VX;
                this.vy = GROUND_BOOST_VY;
                spawnSparks(this.x, this.y, 15, COLORS.brassLight, 120);
                for (let i = 0; i < 10; i++) spawnSteam(this.x, this.y, 0, -80);
            }
        }

        // ========== 撞顶死亡 ==========
        if (this.y < CEILING_Y + this.r) {
            this.y = CEILING_Y + this.r;
            this.vy = Math.abs(this.vy) * 0.3;
            gameOver('撞顶');
            return;
        }
    },

    tryGrapple() {
        let best = null;
        let bestDist = 999999;

        for (const a of anchors) {
            const dx = a.x - this.x;
            const dy = a.y - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < ANCHOR_RANGE && dist > MIN_GRAPPLE_LEN && dx > 10) {
                if (dist < bestDist) {
                    bestDist = dist;
                    best = a;
                }
            }
        }

        if (best) {
            this.grappled = true;
            this.anchor = best;
            const dx = this.x - best.x;
            const dy = this.y - best.y;
            this.grappleLen = Math.sqrt(dx*dx + dy*dy);
            this.grappleLen = Math.min(this.grappleLen, MAX_GRAPPLE_LEN);

            const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
            if (speed < 200) {
                this.vx = 300;
                this.vy = -100;
            }

            combo++;
            maxCombo = Math.max(maxCombo, combo);
            spawnSparks(best.x, best.y, 10, COLORS.brassLight, 100);
            for (let i = 0; i < 4; i++) spawnSteam(best.x, best.y + 10, 0, -30);
        }
    },

    release() {
        if (!this.grappled) return;
        this.grappled = false;
        this.anchor = null;

        this.vx *= RELEASE_BOOST;
        this.vy *= RELEASE_BOOST;

        spawnSparks(this.x, this.y, 6, COLORS.brass, 60);
        spawnSteam(this.x, this.y, this.vx*0.1, this.vy*0.1);
    },

    draw(ctx) {
        for (let i = 0; i < this.trail.length; i++) {
            const t = this.trail[i];
            const a = t.life / 0.25 * 0.35;
            ctx.globalAlpha = a;
            ctx.fillStyle = COLORS.brass;
            ctx.beginPath();
            ctx.arc(t.x, t.y, this.r * (0.5 + a*0.5), 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        if (this.grappled && this.anchor) {
            ctx.strokeStyle = COLORS.chain;
            ctx.lineWidth = 2.5;
            ctx.setLineDash([6, 4]);
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.anchor.x, this.anchor.y);
            ctx.stroke();
            ctx.setLineDash([]);

            const dx = this.anchor.x - this.x;
            const dy = this.anchor.y - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const segs = Math.floor(dist / 14);
            ctx.fillStyle = COLORS.brassDark;
            for (let i = 1; i < segs; i++) {
                const t = i / segs;
                ctx.beginPath();
                ctx.arc(this.x + dx*t, this.y + dy*t, 2.2, 0, Math.PI*2);
                ctx.fill();
            }
        }

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(this.facing, 1);

        ctx.fillStyle = COLORS.brass;
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = COLORS.brassDark;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = COLORS.copper;
        ctx.beginPath();
        ctx.arc(0, 0, this.r*0.7, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = COLORS.brassLight;
        for (let i = 0; i < 4; i++) {
            const a = (i/4) * Math.PI*2 + frame*0.05;
            ctx.beginPath();
            ctx.arc(Math.cos(a)*this.r*0.42, Math.sin(a)*this.r*0.42, 1.8, 0, Math.PI*2);
            ctx.fill();
        }

        ctx.fillStyle = 'rgba(200, 230, 255, 0.25)';
        ctx.beginPath();
        ctx.arc(0, 0, this.r*0.28, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#ffdd44';
        ctx.beginPath();
        ctx.arc(3, -3, 2.5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#221100';
        ctx.beginPath();
        ctx.arc(3.5, -3, 1.2, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = COLORS.rust;
        ctx.fillRect(-this.r-2, -3, 5, 6);

        ctx.restore();
    }
};

// ==================== 输入处理 ====================
function onStart(x, y) {
    isPressed = true;
    if (state === STATE.PLAYING && !player.grappled) {
        player.tryGrapple();
    }
}

function onEnd() {
    isPressed = false;
    if (state === STATE.PLAYING) {
        player.release();
    }
}

// 触摸
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    onStart(t.clientX, t.clientY);
}, {passive: false});

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    onEnd();
});

// 鼠标
canvas.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
canvas.addEventListener('mouseup', () => onEnd());

// ==================== 关卡生成 ====================
let nextAnchorX = 250;
let nextObstacleX = 450;
let nextCoinX = 350;

function generate() {
    const endX = cameraX + W + 600;

    while (nextAnchorX < endX) {
        const margin = 70;
        const y = margin + Math.random() * (H - margin * 2);
        anchors.push(new Anchor(nextAnchorX, y));
        nextAnchorX += 160 + Math.random() * 180;
    }

    while (nextObstacleX < endX) {
        const types = ['spike', 'saw', 'steam'];
        const type = types[Math.floor(Math.random() * types.length)];
        const margin = 60;
        const y = margin + Math.random() * (H - margin * 2);
        const size = type==='steam' ? 50+Math.random()*30 : 25+Math.random()*25;
        obstacles.push(new Obstacle(nextObstacleX, y, size, size, type));
        nextObstacleX += 250 + Math.random() * 350;
    }

    while (nextCoinX < endX) {
        const margin = 60;
        const y = margin + Math.random() * (H - margin * 2);
        coins.push(new Coin(nextCoinX, y));
        nextCoinX += 120 + Math.random() * 200;
    }
}

function cleanup() {
    const cutoff = cameraX - 200;
    anchors = anchors.filter(a => a.x > cutoff);
    obstacles = obstacles.filter(o => o.x > cutoff);
    coins = coins.filter(c => c.x > cutoff && !c.collected);
}

// ==================== 碰撞 ====================
function checkCollisions() {
    for (const o of obstacles) {
        const cx = o.x + o.w/2, cy = o.y + o.h/2;
        const dx = cx - player.x, dy = cy - player.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const hitR = o.type==='steam' ? o.w/2 : o.w/2 + player.r*0.5;

        if (dist < hitR) {
            if (o.type === 'steam') {
                player.vx *= 0.6;
                player.vy *= 0.6;
                spawnSteam(player.x, player.y, 0, 0);
            } else {
                gameOver('撞毁');
                return;
            }
        }
    }

    for (const c of coins) {
        if (c.collected) continue;
        const dx = c.x - player.x, dy = c.y - player.y;
        if (Math.sqrt(dx*dx + dy*dy) < player.r + 12) {
            c.collected = true;
            score += 10 * Math.max(1, combo);
            spawnSparks(c.x, c.y, 8, COLORS.brassLight, 50);
        }
    }

    if (player.x < cameraX - 100) {
        gameOver('落后');
    }
}

// ==================== 游戏流程 ====================
const uiStatus = document.getElementById('status');
const uiScore = document.getElementById('score');
const uiCombo = document.getElementById('combo');
const uiBest = document.getElementById('best');
const uiHint = document.getElementById('hint');

function startGame() {
    state = STATE.PLAYING;
    score = 0;
    combo = 0;
    maxCombo = 0;
    cameraX = 0;
    nextAnchorX = 200;
    nextObstacleX = 450;
    nextCoinX = 300;
    anchors = [];
    obstacles = [];
    coins = [];
    particles = [];

    player.reset();
    generate();

    uiStatus.style.display = 'none';
    uiHint.classList.add('show');
    setTimeout(() => uiHint.classList.remove('show'), 6000);
    uiBest.textContent = '最佳 ' + bestScore + 'm';
}

function gameOver(reason) {
    if (state === STATE.GAMEOVER) return;
    state = STATE.GAMEOVER;
    const dist = Math.floor(player.x / 10);
    if (dist > bestScore) {
        bestScore = dist;
        try { localStorage.setItem('swing_best', bestScore.toString()); } catch(e) {}
    }

    uiStatus.innerHTML = `
        <h1>⚙ ${reason} ⚙</h1>
        <p>距离 ${dist}m · 最佳 ${bestScore}m<br>连击 ${maxCombo}</p>
        <button class="btn" id="restartBtn">再来</button>
    `;
    uiStatus.style.display = 'block';
    document.getElementById('restartBtn').addEventListener('click', startGame);
}

document.getElementById('startBtn').addEventListener('click', startGame);

// ==================== 渲染 ====================
function drawBG() {
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = COLORS.bgGrid;
    ctx.lineWidth = 1;
    const gs = 45;
    const ox = -(cameraX * 0.5 % gs);
    for (let x = ox; x < W; x += gs) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += gs) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    ctx.save();
    ctx.globalAlpha = 0.1;
    const time = frame * 0.008;
    for (let i = 0; i < 5; i++) {
        const gx = ((i * 180 + cameraX * 0.08) % (W + 100)) - 50;
        const gy = 60 + i * 35;
        const gr = 25 + i * 8;
        ctx.save();
        ctx.translate(gx, gy);
        ctx.rotate(time * (i%2===0?1:-1) * (0.3+i*0.1));
        ctx.strokeStyle = COLORS.brassDark;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        const teeth = 8;
        for (let j = 0; j < teeth*2; j++) {
            const a = (j/(teeth*2)) * Math.PI*2;
            const r = j%2===0 ? gr : gr*0.65;
            const px = Math.cos(a)*r, py = Math.sin(a)*r;
            if (j===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0, gr*0.2, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
    }
    ctx.restore();

    // 天花板死亡线
    ctx.fillStyle = COLORS.dangerLine;
    ctx.fillRect(0, 0, W, CEILING_Y);
    ctx.strokeStyle = COLORS.danger;
    ctx.lineWidth = 1;
    ctx.setLineDash([8, 4]);
    ctx.beginPath(); ctx.moveTo(0, CEILING_Y); ctx.lineTo(W, CEILING_Y); ctx.stroke();
    ctx.setLineDash([]);

    // 地面（安全区）
    ctx.strokeStyle = 'rgba(201, 169, 110, 0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([8, 4]);
    ctx.beginPath(); ctx.moveTo(0, FLOOR_Y); ctx.lineTo(W, FLOOR_Y); ctx.stroke();
    ctx.setLineDash([]);

    // 地面装饰
    ctx.fillStyle = COLORS.ground;
    ctx.fillRect(0, FLOOR_Y, W, 30);
    ctx.strokeStyle = COLORS.brassDark;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, FLOOR_Y); ctx.lineTo(W, FLOOR_Y); ctx.stroke();

    ctx.fillStyle = COLORS.brassDark;
    const rivOff = -(cameraX % 55);
    for (let x = rivOff; x < W; x += 55) {
        ctx.beginPath(); ctx.arc(x, FLOOR_Y + 15, 3, 0, Math.PI*2); ctx.fill();
    }
}

// ==================== 主循环 ====================
let lastT = 0;
function loop(ts) {
    const dt = Math.min((ts - lastT) / 1000, 0.05);
    lastT = ts;
    frame++;

    if (state === STATE.PLAYING) {
        const targetCam = Math.max(0, player.x - W * 0.25);
        cameraX += (targetCam - cameraX) * 0.08;

        player.update(dt);

        for (const a of anchors) a.update(dt);
        for (const o of obstacles) o.update(dt);
        for (const c of coins) c.update(dt);

        for (let i = particles.length-1; i >= 0; i--) {
            particles[i].update(dt);
            if (particles[i].life <= 0) particles.splice(i, 1);
        }

        checkCollisions();
        generate();
        cleanup();

        uiScore.textContent = Math.floor(player.x / 10) + 'm';
        uiCombo.textContent = '连击 ' + combo;

        drawBG();

        ctx.save();
        ctx.translate(-cameraX, 0);

        for (const a of anchors) a.draw(ctx);
        for (const o of obstacles) o.draw(ctx);
        for (const c of coins) c.draw(ctx);
        for (const p of particles) p.draw(ctx);
        player.draw(ctx);

        ctx.restore();

    } else if (state === STATE.MENU || state === STATE.GAMEOVER) {
        drawBG();
        for (let i = particles.length-1; i >= 0; i--) {
            particles[i].update(dt);
            if (particles[i].life <= 0) particles.splice(i, 1);
        }
        for (const p of particles) p.draw(ctx);
    }

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
