<head>
    <base target="_blank">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>蒸汽摆荡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            overflow: hidden;
            background: #0d0a05;
            font-family: 'Courier New', monospace;
            touch-action: none;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .hud {
            position: absolute;
            color: #c9a96e;
            text-shadow: 0 0 8px #c9a96e;
            font-size: 14px;
            font-weight: bold;
        }
        #score { top: 12px; left: 16px; }
        #combo { top: 12px; right: 16px; }
        #best { top: 36px; left: 16px; font-size: 12px; color: #8b6914; }
        #status {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #c9a96e;
            text-shadow: 0 0 12px #c9a96e;
            pointer-events: auto;
        }
        #status h1 {
            font-size: 36px;
            margin-bottom: 16px;
            letter-spacing: 6px;
        }
        #status p {
            font-size: 14px;
            color: #a08050;
            margin-bottom: 28px;
            line-height: 2;
        }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            border: 2px solid #c9a96e;
            color: #c9a96e;
            background: rgba(13, 10, 5, 0.95);
            font-size: 16px;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 0 16px rgba(201, 169, 110, 0.2);
        }
        .btn:active {
            background: #c9a96e;
            color: #0d0a05;
            box-shadow: 0 0 32px #c9a96e;
        }
        #hint {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #6a5a3a;
            font-size: 12px;
            line-height: 2;
            opacity: 0;
            transition: opacity 1s;
        }
        #hint.show { opacity: 1; }
    </style>
</head>
