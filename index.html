<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>蒸汽摆荡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            overflow: hidden;
            background: #0d0a05;
            font-family: 'Courier New', monospace;
            touch-action: none;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .hud {
            position: absolute;
            color: #c9a96e;
            text-shadow: 0 0 8px #c9a96e;
            font-size: 14px;
            font-weight: bold;
        }
        #score { top: 12px; left: 16px; }
        #combo { top: 12px; right: 16px; }
        #best { top: 36px; left: 16px; font-size: 12px; color: #8b6914; }
        #status {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #c9a96e;
            text-shadow: 0 0 12px #c9a96e;
            pointer-events: auto;
        }
        #status h1 {
            font-size: 36px;
            margin-bottom: 16px;
            letter-spacing: 6px;
        }
        #status p {
            font-size: 14px;
            color: #a08050;
            margin-bottom: 28px;
            line-height: 2;
        }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            border: 2px solid #c9a96e;
            color: #c9a96e;
            background: rgba(13, 10, 5, 0.95);
            font-size: 16px;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 0 16px rgba(201, 169, 110, 0.2);
        }
        .btn:active {
            background: #c9a96e;
            color: #0d0a05;
            box-shadow: 0 0 32px #c9a96e;
        }
        #hint {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #6a5a3a;
            font-size: 12px;
            line-height: 2;
            opacity: 0;
            transition: opacity 1s;
        }
        #hint.show { opacity: 1; }
    </style>
<base target="_blank">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="score" class="hud">0m</div>
        <div id="combo" class="hud">连击 0</div>
        <div id="best" class="hud">最佳 0m</div>
        <div id="status">
            <h1>⚙ 蒸汽摆荡 ⚙</h1>
            <p>👆 按住屏幕 → 钩爪抓锚，开始摆荡<br>👈 左右滑动 → 控制摆荡推力方向<br>✋ 松开手指 → 钩爪释放，抛物线飞出</p>
            <button class="btn" id="startBtn">开始</button>
        </div>
        <div id="hint">
            <div>按住抓钩 · 滑动控向 · 松手飞出</div>
        </div>
    </div>

<script>
// ==================== 初始化 ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, DPR;
function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ==================== 常量 ====================
const GRAVITY = 900;
const MAX_GRAPPLE_LEN = 280;
const MIN_GRAPPLE_LEN = 60;
const ANCHOR_RANGE = 320;
const SWING_FORCE = 600;
const RELEASE_BOOST = 1.15;
const AIR_DRAG = 0.999;

const COLORS = {
    bg: '#0d0a05',
    bgGrid: 'rgba(201, 169, 110, 0.025)',
    brass: '#c9a96e',
    brassDark: '#8b6914',
    brassLight: '#e8d5a3',
    copper: '#b87333',
    rust: '#8b4513',
    danger: '#c44',
    chain: '#6a5a3a',
    ground: '#151008',
    steam: 'rgba(200, 200, 180, 0.12)'
};

// ==================== 状态 ====================
const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
let state = STATE.MENU;
let frame = 0;
let score = 0;
let bestScore = 0;
try { bestScore = parseInt(localStorage.getItem('swing_best') || '0'); } catch(e) { bestScore = 0; }
let combo = 0;
let maxCombo = 0;
let cameraX = 0;

// ==================== 输入 ====================
let isPressed = false;
let pressStartX = 0;
let pressStartY = 0;
let currentTouchX = 0;
let currentTouchY = 0;
let slideDelta = 0;

// ==================== 粒子 ====================
class Particle {
    constructor(x, y, vx, vy, life, color, size) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life;
        this.color = color;
        this.size = size;
    }
    update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy += 200 * dt;
        this.life -= dt;
        this.size *= 0.97;
    }
    draw(ctx) {
        const a = Math.max(0, this.life / this.maxLife);
        ctx.globalAlpha = a;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}
let particles = [];

function spawnSparks(x, y, count, color, speed) {
    for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const v = Math.random() * speed;
        particles.push(new Particle(x, y, Math.cos(a)*v, Math.sin(a)*v, 0.4+Math.random()*0.4, color, 2+Math.random()*3));
    }
}

function spawnSteam(x, y, vx, vy) {
    particles.push(new Particle(x, y, vx||0, vy||-40, 1+Math.random(), COLORS.steam, 6+Math.random()*10));
}

// ==================== 锚点 ====================
class Anchor {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.baseY = y;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = 0.4 + Math.random() * 0.8;
        this.amp = 10 + Math.random() * 20;
        this.pulse = 0;
    }
    update(dt) {
        this.phase += this.speed * dt;
        this.y = this.baseY + Math.sin(this.phase) * this.amp;
        this.pulse += dt * 4;
    }
    draw(ctx) {
        const pulse = Math.sin(this.pulse) * 3;
        ctx.strokeStyle = COLORS.brass;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 14 + pulse, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = COLORS.copper;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = COLORS.brassLight;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = COLORS.rust;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.x-2, this.y); ctx.lineTo(this.x+2, this.y);
        ctx.moveTo(this.x, this.y-2); ctx.lineTo(this.x, this.y+2);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(139, 105, 20, 0.4)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + 14);
        ctx.lineTo(this.x + Math.sin(this.phase*2)*8, this.y + 35);
        ctx.stroke();
    }
}
let anchors = [];

// ==================== 障碍 ====================
class Obstacle {
    constructor(x, y, w, h, type) {
        this.x = x; this.y = y; this.w = w; this.h = h;
        this.type = type;
        this.angle = Math.random() * Math.PI * 2;
        this.rotSpeed = (type==='saw') ? (3 + Math.random()*4) : 0;
    }
    update(dt) {
        this.angle += this.rotSpeed * dt;
    }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x + this.w/2, this.y + this.h/2);
        ctx.rotate(this.angle);
        if (this.type === 'spike') {
            ctx.fillStyle = '#555';
            ctx.strokeStyle = '#777';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(-this.w/2, this.h/2);
            ctx.lineTo(this.w/2, this.h/2);
            ctx.lineTo(0, -this.h/2);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            ctx.beginPath();
            ctx.moveTo(-this.w/2+3, this.h/2-2);
            ctx.lineTo(this.w/2-3, this.h/2-2);
            ctx.lineTo(0, -this.h/2+4);
            ctx.closePath();
            ctx.fill();
        } else if (this.type === 'saw') {
            const teeth = 10;
            ctx.fillStyle = '#633';
            ctx.strokeStyle = COLORS.danger;
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < teeth*2; i++) {
                const a = (i/(teeth*2)) * Math.PI*2;
                const r = i%2===0 ? this.w/2 : this.w*0.35;
                const px = Math.cos(a)*r, py = Math.sin(a)*r;
                if (i===0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(0,0, this.w*0.15, 0, Math.PI*2);
            ctx.fill();
        } else if (this.type === 'steam') {
            ctx.fillStyle = 'rgba(180,180,160,0.12)';
            ctx.beginPath();
            ctx.arc(0,0, this.w/2, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.restore();
    }
}
let obstacles = [];

// ==================== 收集物 ====================
class Coin {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.collected = false;
        this.float = Math.random() * Math.PI * 2;
    }
    update(dt) {
        this.float += dt * 2.5;
        this.y += Math.sin(this.float) * 0.6;
    }
    draw(ctx) {
        if (this.collected) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.float * 0.5);
        ctx.fillStyle = COLORS.brass;
        ctx.beginPath();
        const r = 10, teeth = 6;
        for (let i = 0; i < teeth*2; i++) {
            const a = (i/(teeth*2)) * Math.PI*2;
            const rad = i%2===0 ? r : r*0.65;
            const px = Math.cos(a)*rad, py = Math.sin(a)*rad;
            if (i===0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = COLORS.brassLight;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = COLORS.brassLight;
        ctx.beginPath();
        ctx.arc(0,0, 3.5, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}
let coins = [];

// ==================== 玩家 ====================
const player = {
    x: 100, y: H/2,
    vx: 0, vy: 0,
    r: 11,
    grappled: false,
    anchor: null,
    grappleLen: 0,
    grappleAngle: 0,
    angularVel: 0,
    trail: [],
    invincible: 0,
    facing: 1,

    reset() {
        this.x = 80;
        this.y = H/2;
        this.vx = 0; this.vy = 0;
        this.grappled = false;
        this.anchor = null;
        this.trail = [];
        this.invincible = 0;
        this.facing = 1;
    },

    update(dt) {
        const ground = H - 30;

        if (this.grappled && this.anchor) {
            // ========== 摆荡物理 ==========
            const ax = this.anchor.x;
            const ay = this.anchor.y;
            const dx = this.x - ax;
            const dy = this.y - ay;

            const angle = Math.atan2(dy, dx);

            // 重力角加速度
            const angularAcc = (GRAVITY / this.grappleLen) * Math.sin(angle);

            // 滑动推力
            if (isPressed && Math.abs(slideDelta) > 0.1) {
                const pushDir = slideDelta > 0 ? 1 : -1;
                const pushStrength = SWING_FORCE / this.grappleLen * 0.5;
                this.angularVel += pushDir * pushStrength * Math.abs(slideDelta) * dt;
            }

            this.angularVel += angularAcc * dt;
            this.angularVel *= 0.9995;

            const newAngle = angle + this.angularVel * dt;

            this.x = ax + Math.cos(newAngle) * this.grappleLen;
            this.y = ay + Math.sin(newAngle) * this.grappleLen;
            this.grappleAngle = newAngle;

            this.vx = -Math.sin(newAngle) * this.angularVel * this.grappleLen;
            this.vy = Math.cos(newAngle) * this.angularVel * this.grappleLen;

            this.facing = this.vx >= 0 ? 1 : -1;

            if (frame % 8 === 0 && Math.abs(this.angularVel) > 1) {
                spawnSteam(this.x, this.y + 5, -this.vx*0.1, -10);
            }

        } else {
            // ========== 自由飞行 ==========
            this.vy += GRAVITY * dt;
            this.vx *= AIR_DRAG;
            this.vy *= AIR_DRAG;
            this.x += this.vx * dt;
            this.y += this.vy * dt;

            if (Math.abs(this.vx) > 10) this.facing = this.vx > 0 ? 1 : -1;

            // 地面
            if (this.y > ground - this.r) {
                this.y = ground - this.r;
                this.vy = -Math.abs(this.vy) * 0.35;
                this.vx *= 0.7;
                if (Math.abs(this.vy) > 80) {
                    spawnSparks(this.x, ground, 4, COLORS.brass, 40);
                }
            }
            // 天花板
            if (this.y < this.r + 30) {
                this.y = this.r + 30;
                this.vy = Math.abs(this.vy) * 0.3;
            }

            // 按住时尝试抓锚
            if (isPressed && !this.grappled) {
                this.tryGrapple();
            }

            if (frame % 5 === 0 && (Math.abs(this.vx) > 150 || Math.abs(this.vy) > 150)) {
                spawnSteam(this.x - this.vx*0.02, this.y, 0, 0);
            }
        }

        // 拖尾
        this.trail.push({x: this.x, y: this.y, life: 0.25});
        for (let i = this.trail.length-1; i >= 0; i--) {
            this.trail[i].life -= dt;
            if (this.trail[i].life <= 0) this.trail.splice(i, 1);
        }

        if (this.invincible > 0) this.invincible -= dt;
    },

    tryGrapple() {
        let best = null;
        let bestScore = 999999;

        for (const a of anchors) {
            const dx = a.x - this.x;
            const dy = a.y - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < ANCHOR_RANGE && dist > MIN_GRAPPLE_LEN && dx > -30) {
                const score = dist + (dx < 0 ? 200 : 0);
                if (score < bestScore) {
                    bestScore = score;
                    best = a;
                }
            }
        }

        if (best) {
            this.grappled = true;
            this.anchor = best;
            const dx = this.x - best.x;
            const dy = this.y - best.y;
            this.grappleLen = Math.sqrt(dx*dx + dy*dy);
            this.grappleLen = Math.min(this.grappleLen, MAX_GRAPPLE_LEN);
            this.grappleAngle = Math.atan2(dy, dx);

            const tangentX = -Math.sin(this.grappleAngle);
            const tangentY = Math.cos(this.grappleAngle);
            const speedProj = this.vx * tangentX + this.vy * tangentY;
            this.angularVel = speedProj / this.grappleLen;

            combo++;
            maxCombo = Math.max(maxCombo, combo);
            spawnSparks(best.x, best.y, 10, COLORS.brassLight, 100);
            for (let i = 0; i < 4; i++) spawnSteam(best.x, best.y + 10, 0, -30);
        }
    },

    release() {
        if (!this.grappled) return;
        this.grappled = false;
        this.vx *= RELEASE_BOOST;
        this.vy *= RELEASE_BOOST;

        if (isPressed && Math.abs(slideDelta) > 0.3) {
            const pushDir = slideDelta > 0 ? 1 : -1;
            const velDir = this.vx > 0 ? 1 : -1;
            if (pushDir === velDir) {
                this.vx *= 1.2;
            }
        }

        spawnSparks(this.x, this.y, 6, COLORS.brass, 60);
        spawnSteam(this.x, this.y, this.vx*0.1, this.vy*0.1);
    },

    draw(ctx) {
        for (let i = 0; i < this.trail.length; i++) {
            const t = this.trail[i];
            const a = t.life / 0.25 * 0.35;
            ctx.globalAlpha = a;
            ctx.fillStyle = COLORS.brass;
            ctx.beginPath();
            ctx.arc(t.x, t.y, this.r * (0.5 + a*0.5), 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        if (this.grappled && this.anchor) {
            ctx.strokeStyle = COLORS.chain;
            ctx.lineWidth = 2.5;
            ctx.setLineDash([6, 4]);
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.anchor.x, this.anchor.y);
            ctx.stroke();
            ctx.setLineDash([]);

            const dx = this.anchor.x - this.x;
            const dy = this.anchor.y - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const segs = Math.floor(dist / 14);
            ctx.fillStyle = COLORS.brassDark;
            for (let i = 1; i < segs; i++) {
                const t = i / segs;
                ctx.beginPath();
                ctx.arc(this.x + dx*t, this.y + dy*t, 2.2, 0, Math.PI*2);
                ctx.fill();
            }
        }

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(this.facing, 1);

        ctx.fillStyle = COLORS.brass;
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = COLORS.brassDark;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = COLORS.copper;
        ctx.beginPath();
        ctx.arc(0, 0, this.r*0.7, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = COLORS.brassLight;
        for (let i = 0; i < 4; i++) {
            const a = (i/4) * Math.PI*2 + frame*0.05;
            ctx.beginPath();
            ctx.arc(Math.cos(a)*this.r*0.42, Math.sin(a)*this.r*0.42, 1.8, 0, Math.PI*2);
            ctx.fill();
        }

        ctx.fillStyle = 'rgba(200, 230, 255, 0.25)';
        ctx.beginPath();
        ctx.arc(0, 0, this.r*0.28, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#ffdd44';
        ctx.beginPath();
        ctx.arc(3, -3, 2.5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#221100';
        ctx.beginPath();
        ctx.arc(3.5, -3, 1.2, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = COLORS.rust;
        ctx.fillRect(-this.r-2, -3, 5, 6);

        ctx.restore();

        if (this.invincible > 0 && Math.floor(this.invincible*12)%2===0) {
            ctx.strokeStyle = COLORS.brassLight;
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r+5, 0, Math.PI*2);
            ctx.stroke();
        }
    }
};

// ==================== 输入处理 ====================
function onStart(x, y) {
    isPressed = true;
    pressStartX = x;
    pressStartY = y;
    currentTouchX = x;
    currentTouchY = y;
    slideDelta = 0;

    if (state === STATE.PLAYING && !player.grappled) {
        player.tryGrapple();
    }
}

function onMove(x, y) {
    currentTouchX = x;
    currentTouchY = y;

    if (isPressed) {
        const dx = x - pressStartX;
        const maxSlide = W * 0.3;
        slideDelta = Math.max(-1, Math.min(1, dx / maxSlide));
    }
}

function onEnd() {
    isPressed = false;
    slideDelta = 0;

    if (state === STATE.PLAYING) {
        player.release();
    }
}

// 触摸
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    onStart(t.clientX, t.clientY);
}, {passive: false});

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    onMove(t.clientX, t.clientY);
}, {passive: false});

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    onEnd();
});

// 鼠标
canvas.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
canvas.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
canvas.addEventListener('mouseup', () => onEnd());

// ==================== 关卡生成 ====================
let nextAnchorX = 250;
let nextObstacleX = 450;
let nextCoinX = 350;

function generate() {
    const endX = cameraX + W + 600;

    while (nextAnchorX < endX) {
        const y = 80 + Math.random() * (H - 200);
        anchors.push(new Anchor(nextAnchorX, y));
        nextAnchorX += 140 + Math.random() * 160;
    }

    while (nextObstacleX < endX) {
        const types = ['spike', 'saw', 'steam'];
        const type = types[Math.floor(Math.random() * types.length)];
        const y = 100 + Math.random() * (H - 180);
        const size = type==='steam' ? 50+Math.random()*30 : 25+Math.random()*25;
        obstacles.push(new Obstacle(nextObstacleX, y, size, size, type));
        nextObstacleX += 200 + Math.random() * 300;
    }

    while (nextCoinX < endX) {
        const y = 60 + Math.random() * (H - 140);
        coins.push(new Coin(nextCoinX, y));
        nextCoinX += 100 + Math.random() * 200;
    }
}

function cleanup() {
    const cutoff = cameraX - 200;
    anchors = anchors.filter(a => a.x > cutoff);
    obstacles = obstacles.filter(o => o.x > cutoff);
    coins = coins.filter(c => c.x > cutoff && !c.collected);
}

// ==================== 碰撞 ====================
function checkCollisions() {
    if (player.invincible > 0) return;

    for (const o of obstacles) {
        const cx = o.x + o.w/2, cy = o.y + o.h/2;
        const dx = cx - player.x, dy = cy - player.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const hitR = o.type==='steam' ? o.w/2 : o.w/2 + player.r*0.5;

        if (dist < hitR) {
            if (o.type === 'steam') {
                player.vx *= 0.6;
                player.vy *= 0.6;
                spawnSteam(player.x, player.y, 0, 0);
            } else {
                gameOver();
                return;
            }
        }
    }

    for (const c of coins) {
        if (c.collected) continue;
        const dx = c.x - player.x, dy = c.y - player.y;
        if (Math.sqrt(dx*dx + dy*dy) < player.r + 12) {
            c.collected = true;
            score += 10 * Math.max(1, combo);
            spawnSparks(c.x, c.y, 8, COLORS.brassLight, 50);
        }
    }

    if (player.y > H + 80 || player.x < cameraX - 100) {
        gameOver();
    }
}

// ==================== 游戏流程 ====================
const uiStatus = document.getElementById('status');
const uiScore = document.getElementById('score');
const uiCombo = document.getElementById('combo');
const uiBest = document.getElementById('best');
const uiHint = document.getElementById('hint');

function startGame() {
    state = STATE.PLAYING;
    score = 0;
    combo = 0;
    maxCombo = 0;
    cameraX = 0;
    nextAnchorX = 200;
    nextObstacleX = 450;
    nextCoinX = 300;
    anchors = [];
    obstacles = [];
    coins = [];
    particles = [];

    player.reset();
    generate();

    uiStatus.style.display = 'none';
    uiHint.classList.add('show');
    setTimeout(() => uiHint.classList.remove('show'), 6000);
    uiBest.textContent = '最佳 ' + bestScore + 'm';
}

function gameOver() {
    state = STATE.GAMEOVER;
    const dist = Math.floor(player.x / 10);
    if (dist > bestScore) {
        bestScore = dist;
        try { localStorage.setItem('swing_best', bestScore.toString()); } catch(e) {}
    }

    uiStatus.innerHTML = `
        <h1>⚙ 坠落 ⚙</h1>
        <p>距离 ${dist}m · 最佳 ${bestScore}m<br>连击 ${maxCombo}</p>
        <button class="btn" id="restartBtn">再来</button>
    `;
    uiStatus.style.display = 'block';
    document.getElementById('restartBtn').addEventListener('click', startGame);
}

document.getElementById('startBtn').addEventListener('click', startGame);

// ==================== 渲染 ====================
function drawBG() {
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = COLORS.bgGrid;
    ctx.lineWidth = 1;
    const gs = 45;
    const ox = -(cameraX * 0.5 % gs);
    for (let x = ox; x < W; x += gs) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += gs) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    ctx.save();
    ctx.globalAlpha = 0.1;
    const time = frame * 0.008;
    for (let i = 0; i < 5; i++) {
        const gx = ((i * 180 + cameraX * 0.08) % (W + 100)) - 50;
        const gy = 60 + i * 35;
        const gr = 25 + i * 8;
        ctx.save();
        ctx.translate(gx, gy);
        ctx.rotate(time * (i%2===0?1:-1) * (0.3+i*0.1));
        ctx.strokeStyle = COLORS.brassDark;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        const teeth = 8;
        for (let j = 0; j < teeth*2; j++) {
            const a = (j/(teeth*2)) * Math.PI*2;
            const r = j%2===0 ? gr : gr*0.65;
            const px = Math.cos(a)*r, py = Math.sin(a)*r;
            if (j===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0, gr*0.2, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
    }
    ctx.restore();

    const ground = H - 30;
    ctx.fillStyle = COLORS.ground;
    ctx.fillRect(0, ground, W, 30);
    ctx.strokeStyle = COLORS.brassDark;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, ground); ctx.lineTo(W, ground); ctx.stroke();

    ctx.fillStyle = COLORS.brassDark;
    const rivOff = -(cameraX % 55);
    for (let x = rivOff; x < W; x += 55) {
        ctx.beginPath(); ctx.arc(x, ground + 15, 3, 0, Math.PI*2); ctx.fill();
    }

    ctx.strokeStyle = 'rgba(139, 105, 20, 0.25)';
    ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.moveTo(0, ground - 18);
    for (let x = 0; x < W; x += 15) {
        ctx.lineTo(x, ground - 18 + Math.sin((x+cameraX)*0.015)*4);
    }
    ctx.stroke();
}

function drawSlideIndicator() {
    if (!isPressed || !player.grappled) return;

    const cx = W / 2;
    const cy = H - 80;
    const barW = 120;

    ctx.globalAlpha = 0.4;
    ctx.fillStyle = COLORS.brassDark;
    ctx.fillRect(cx - barW/2, cy, barW, 6);

    const knobX = cx + slideDelta * barW/2;
    ctx.fillStyle = Math.abs(slideDelta) > 0.3 ? COLORS.brassLight : COLORS.brass;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(knobX, cy + 3, 8, 0, Math.PI*2);
    ctx.fill();

    ctx.globalAlpha = 0.5;
    ctx.fillStyle = COLORS.brass;
    ctx.font = '11px Courier New';
    ctx.textAlign = 'center';
    if (slideDelta < -0.3) ctx.fillText('← 后拉', cx, cy - 12);
    else if (slideDelta > 0.3) ctx.fillText('前推 →', cx, cy - 12);
    else ctx.fillText('· 平衡 ·', cx, cy - 12);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
}

// ==================== 主循环 ====================
let lastT = 0;
function loop(ts) {
    const dt = Math.min((ts - lastT) / 1000, 0.05);
    lastT = ts;
    frame++;

    if (state === STATE.PLAYING) {
        const targetCam = Math.max(0, player.x - W * 0.25);
        cameraX += (targetCam - cameraX) * 0.08;

        player.update(dt);

        for (const a of anchors) a.update(dt);
        for (const o of obstacles) o.update(dt);
        for (const c of coins) c.update(dt);

        for (let i = particles.length-1; i >= 0; i--) {
            particles[i].update(dt);
            if (particles[i].life <= 0) particles.splice(i, 1);
        }

        checkCollisions();
        generate();
        cleanup();

        uiScore.textContent = Math.floor(player.x / 10) + 'm';
        uiCombo.textContent = '连击 ' + combo;

        drawBG();

        ctx.save();
        ctx.translate(-cameraX, 0);

        for (const a of anchors) a.draw(ctx);
        for (const o of obstacles) o.draw(ctx);
        for (const c of coins) c.draw(ctx);
        for (const p of particles) p.draw(ctx);
        player.draw(ctx);

        ctx.restore();

        drawSlideIndicator();

    } else if (state === STATE.MENU || state === STATE.GAMEOVER) {
        drawBG();
        for (let i = particles.length-1; i >= 0; i--) {
            particles[i].update(dt);
            if (particles[i].life <= 0) particles.splice(i, 1);
        }
        for (const p of particles) p.draw(ctx);
    }

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
